# Elderwood - Helix theme

# ---- Core palette (Elderwood) ----
# bg0      #0B1F19  (deep emerald)
# bg1      #17382E  (mid emerald)
# fg0      #D8C8A8  (parchment)
# fg1      #CBBFA2  (soft parchment)
# moss     #2F6B53
# sage     #7FAF96
# amber    #8C6A3A
# iron     #3A3F3B
# bark     #141815

"ui.background" = { bg = "#0B1F19" }
"ui.text"       = { fg = "#D8C8A8" }
"ui.text.focus" = { fg = "#D8C8A8" }

"ui.cursor"        = { fg = "#0B1F19", bg = "#D8C8A8" }
"ui.cursor.insert" = { fg = "#0B1F19", bg = "#CBBFA2" }
"ui.cursor.select" = { fg = "#0B1F19", bg = "#7FAF96" }

"ui.selection" = { bg = "#17382E" }
"ui.selection.primary" = { bg = "#17382E" }

"ui.cursorline.primary" = { bg = "#0F2E24" }
"ui.linenr"       = { fg = "#3A4F47" }
"ui.linenr.selected" = { fg = "#CBBFA2" }

"ui.statusline" = { fg = "#CBBFA2", bg = "#0F2E24" }
"ui.statusline.inactive" = { fg = "#3A4F47", bg = "#0B1F19" }

"ui.popup"  = { fg = "#D8C8A8", bg = "#0F2E24" }
"ui.window" = { fg = "#2A3B35" } # subtle borders
"ui.help"   = { fg = "#D8C8A8", bg = "#0F2E24" }

"ui.menu" = { fg = "#CBBFA2", bg = "#0F2E24" }
"ui.menu.selected" = { fg = "#0B1F19", bg = "#D8C8A8" }

"ui.virtual.whitespace" = { fg = "#2A3B35" }
"ui.virtual.indent-guide" = { fg = "#22312C" }
"ui.virtual.ruler" = { bg = "#0F2E24" }

"ui.highlight" = { bg = "#17382E" }
"ui.find"      = { fg = "#0B1F19", bg = "#8C6A3A" }

"warning" = { fg = "#8C6A3A" }
"error"   = { fg = "#B56B5A" }
"info"    = { fg = "#7FAF96" }
"hint"    = { fg = "#2F6B53" }

# ---- Syntax ----
"comment" = { fg = "#2F6B53" }        # Blow-like green comments, but mossy (not neon) :contentReference[oaicite:2]{index=2}
"comment.block" = { fg = "#2F6B53" }

"string"  = { fg = "#B8A97E" }        # aged parchment ink
"constant.numeric" = { fg = "#7FAF96" }
"constant" = { fg = "#7FAF96" }
"constant.character.escape" = { fg = "#8C6A3A" }

"variable" = { fg = "#D8C8A8" }
"variable.builtin" = { fg = "#CBBFA2" }
"variable.parameter" = { fg = "#CBBFA2" }

"function" = { fg = "#D8C8A8" }       # minimal: functions don’t scream
"function.builtin" = { fg = "#CBBFA2" }

"keyword" = { fg = "#CBBFA2" }
"keyword.control" = { fg = "#CBBFA2" }
"keyword.operator" = { fg = "#CBBFA2" }

"operator" = { fg = "#CBBFA2" }
"punctuation" = { fg = "#CBBFA2" }
"punctuation.delimiter" = { fg = "#CBBFA2" }
"punctuation.bracket" = { fg = "#D8C8A8" }

"type" = { fg = "#7FAF96" }
"type.builtin" = { fg = "#7FAF96" }

"namespace" = { fg = "#7FAF96" }
"attribute" = { fg = "#8C6A3A" }

"label" = { fg = "#8C6A3A" }

# ---- Markup (optional sanity) ----
"markup.heading" = { fg = "#D8C8A8", modifiers = ["bold"] }
"markup.bold" = { fg = "#D8C8A8", modifiers = ["bold"] }
"markup.italic" = { fg = "#CBBFA2", modifiers = ["italic"] }
"markup.link.url" = { fg = "#7FAF96", modifiers = ["underlined"] }
"markup.raw" = { fg = "#B8A97E" }

# ---- Diagnostics ----
"diagnostic.hint" = { underline = { color = "#2F6B53", style = "line" } }
"diagnostic.info" = { underline = { color = "#7FAF96", style = "line" } }
"diagnostic.warning" = { underline = { color = "#8C6A3A", style = "line" } }
"diagnostic.error" = { underline = { color = "#B56B5A", style = "line" } }
